services:
  db:
    image: postgres:16-alpine
    container_name: axiovital_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-axiovital}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: axiovital_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: axiovital_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-axiovital}
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai_service:8001
    volumes:
      - ./backend:/app/backend
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ai_service:
        condition: service_started

  ai_service:
    build:
      context: .
      dockerfile: ai_service/Dockerfile
    container_name: axiovital_ai_service
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./ai_service:/app/ai_service
    command: ["uvicorn", "ai_service.main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: axiovital_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started

  semantic_search:
    image: denoland/deno:alpine-1.37.0
    container_name: axiovital_semantic_search
    restart: always
    ports:
      - "9000:8000"
    volumes:
      - ./supabase/functions/semantic-search:/app
    working_dir: /app
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-http://host.docker.internal:54321}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-dummy_key_for_local_dev}
    command: ["run", "--allow-net", "--allow-env", "--watch", "index.ts"]

volumes:
  postgres_data:
  redis_data:
