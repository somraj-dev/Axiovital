name: axiovital
description: Axiovital Mobile Application
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  provider: ^6.1.1
  supabase_flutter: ^2.6.0
  http: ^1.2.0
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.0
  file_picker: ^8.0.3
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  intl: ^0.18.1
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  crypto: ^3.0.3
  convert: ^3.1.1
  local_auth: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/axiovital_icon_1024.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/axiovital_icon_1024.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/reports/
    - assets/previews/
    - assets/data/
