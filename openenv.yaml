# OpenEnv Environment Specification
# Documentation: https://docs.openenv.io/spec

version: "1.0.0"
metadata:
  name: "axiovital-health-agent"
  description: "AI-driven personalized healthcare diagnostic and diagnostic support system."
  author: "somraj-dev"
  category: "healthcare"

# API Endpoints
endpoints:
  health: "/health"
  reset: "/reset"
  step: "/step"
  state: "/state"

# Standard Action Space for Health Diagnosis
action_space:
  type: "discrete"
  actions:
    - "GET_VITALS"       # Retrieve latest patient vital signs
    - "ANALYZE_RISK"     # Perform diagnostic risk calculation
    - "PROVIDE_REMEDY"   # Generate medical recommendations
    - "UPDATE_RECORDS"   # Save consultation state to EHR

# Observation Space (State)
observation_space:
  type: "dict"
  schema:
    user_id: "string"
    vitals:
      heart_rate: "integer"
      spo2: "integer"
      blood_pressure: "string"
    risk_assessment:
      level: "string"
      score: "float"

# Rewarding Criteria (Optional but helpful for evaluators)
reward:
  type: "float"
  range: [0.0, 1.0]
  description: "Accuracy of diagnosis vs standard clinical thresholds."
