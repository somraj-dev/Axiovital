# OpenEnv Environment Specification
version: "1.0.0"
metadata:
  name: "axiovital-health-agent"
  description: "AI-driven personalized healthcare diagnostic and support system."
  author: "somraj-dev"
  category: "healthcare"
  tasks:
    - name: "vitals-check"
      difficulty: "easy"
      description: "Retrieve basic patient vitals."
    - name: "risk-assessment"
      difficulty: "medium"
      description: "Analyze vitals and identify potential health risks."
    - name: "clinical-remedy"
      difficulty: "hard"
      description: "Develop a clinical remedy for a high-risk patient state."

# API Endpoints
endpoints:
  health: "/health"
  reset: "/reset"
  step: "/step"
  state: "/state"

# Standard Action Space
action_space:
  type: "discrete"
  actions:
    - "GET_VITALS"       # Retrieve latest patient vital signs
    - "ANALYZE_RISK"     # Perform diagnostic risk calculation
    - "PROVIDE_REMEDY"   # Generate medical recommendations

# Observation Space (State)
observation_space:
  type: "dict"
  schema:
    task: "string"
    instruction: "string"
    observation:
      heart_rate: "integer"
      systolic_bp: "integer"
      history: "list"

# Rewarding Criteria
reward:
  type: "float"
  range: [0.0, 1.0]
  description: "Completion progress toward clinical task goals."
