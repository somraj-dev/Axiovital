name: Build & Release APK

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.2"
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get
        working-directory: frontend

      - name: Generate Android files (if missing)
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --project-name=axiovital .
          fi
          # Force the application name to AxioVital in the manifest
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/android:label=".*"/android:label="AxioVital"/' "$MANIFEST"
            echo "Updated Android label to AxioVital"
          fi
        working-directory: frontend

      - name: Fix Kotlin and Gradle Versions
        run: |
          # 1. Update Kotlin version in build.gradle
          BUILD_GRADLE="android/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.22'/" "$BUILD_GRADLE"
            sed -i "s/kotlin_version = .*/kotlin_version = '1.9.22'/" "$BUILD_GRADLE"
            echo "Kotlin version update attempted in $BUILD_GRADLE"
          fi

          # 2. Update Kotlin version in settings.gradle (for modern declarative builds)
          SETTINGS_GRADLE="android/settings.gradle"
          if [ -f "$SETTINGS_GRADLE" ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/' "$SETTINGS_GRADLE"
            echo "Kotlin version update attempted in $SETTINGS_GRADLE"
          fi

          # 3. Fix Gradle wrapper to a known compatible version for Flutter 3.19
          WRAPPER_FILE="android/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$WRAPPER_FILE" ]; then
            sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.2.1-all.zip|' "$WRAPPER_FILE"
            echo "Updated Gradle wrapper to 8.2.1"
          fi

          # 4. Ensure SDK versions are set correctly (Global Overrides for Plugins & App)
          APP_BUILD_GRADLE="android/app/build.gradle"
          ROOT_BUILD_GRADLE="android/build.gradle"
          LOCAL_PROPERTIES="android/local.properties"
          
          # Initialize local.properties with guaranteed values, but APPEND so we don't erase sdk.dir
          # This resolves the "null object / substring" errors in plugins
          if [ -n "$FLUTTER_ROOT" ]; then
            echo "flutter.sdk=$FLUTTER_ROOT" >> "$LOCAL_PROPERTIES"
          fi
          echo "flutter.compileSdkVersion=35" >> "$LOCAL_PROPERTIES"
          echo "flutter.targetSdkVersion=35" >> "$LOCAL_PROPERTIES"
          echo "flutter.minSdkVersion=21" >> "$LOCAL_PROPERTIES"
          
          # Force all subprojects (plugins) to use SDK 35
          # This is the "God mode" fix for plugin compatibility issues.
          # We PREPEND it to ensure it registers before evaluation finishes!
          if [ -f "$ROOT_BUILD_GRADLE" ]; then
            TMP_GRADLE="temp.gradle"
            echo "allprojects {" > "$TMP_GRADLE"
            echo "    subprojects {" >> "$TMP_GRADLE"
            echo "        ext.flutter = [" >> "$TMP_GRADLE"
            echo "            compileSdkVersion: 35," >> "$TMP_GRADLE"
            echo "            targetSdkVersion: 35," >> "$TMP_GRADLE"
            echo "            minSdkVersion: 23" >> "$TMP_GRADLE"
            echo "        ]" >> "$TMP_GRADLE"
            echo "        afterEvaluate { project ->" >> "$TMP_GRADLE"
            echo "            if (project.hasProperty('android')) {" >> "$TMP_GRADLE"
            echo "                project.android {" >> "$TMP_GRADLE"
            echo "                    compileSdk 35" >> "$TMP_GRADLE"
            echo "                    buildToolsVersion \"35.0.0\"" >> "$TMP_GRADLE"
            echo "                    defaultConfig {" >> "$TMP_GRADLE"
            echo "                        minSdk 23" >> "$TMP_GRADLE"
            echo "                        targetSdk 35" >> "$TMP_GRADLE"
            echo "                    }" >> "$TMP_GRADLE"
            echo "                }" >> "$TMP_GRADLE"
            echo "            }" >> "$TMP_GRADLE"
            echo "        }" >> "$TMP_GRADLE"
            echo "    }" >> "$TMP_GRADLE"
            echo "}" >> "$TMP_GRADLE"
            
            # Prepend block to the original build.gradle
            cat "$ROOT_BUILD_GRADLE" >> "$TMP_GRADLE"
            mv "$TMP_GRADLE" "$ROOT_BUILD_GRADLE"
            echo "Prepended global overrides to $ROOT_BUILD_GRADLE"
          fi

          if [ -f "$APP_BUILD_GRADLE" ]; then
            # Sync main app build.gradle to avoid any confusion
            sed -i 's/compileSdk .*/compileSdk 35/' "$APP_BUILD_GRADLE"
            sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' "$APP_BUILD_GRADLE"
            sed -i 's/targetSdk .*/targetSdk 35/' "$APP_BUILD_GRADLE"
            sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' "$APP_BUILD_GRADLE"
            sed -i 's/minSdk .*/minSdk 23/' "$APP_BUILD_GRADLE"
            sed -i 's/minSdkVersion .*/minSdkVersion 23/' "$APP_BUILD_GRADLE"
            
            echo "Updated SDK versions to 35 in $APP_BUILD_GRADLE"
          fi
        working-directory: frontend

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: flutter build apk --release
        working-directory: frontend

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
